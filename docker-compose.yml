services:
  mysql:
    image: mysql:8
    container_name: wiki_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wiki
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: